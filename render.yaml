services:
  - type: web
    name: prophet-arena-agent
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: openai/gpt-5.4
      - key: OPENROUTER_REASONING_EFFORT
        value: medium
      - key: EXA_API_KEY
        sync: false
      - key: EXA_SEARCH_ROUNDS
        value: "2"
      - key: EXA_RESULTS_PER_QUERY
        value: "4"
      - key: EXA_MAX_SOURCES
        value: "10"
      - key: AGENT_API_KEY
        sync: false
