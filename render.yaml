services:
  - type: web
    name: prophet-arena-agent
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: openai/gpt-5.4
      - key: OPENROUTER_REASONING_EFFORT
        value: medium
      - key: OPENROUTER_FORECASTER_MODEL
        value: openai/gpt-5.4
      - key: OPENROUTER_VERIFIER_MODEL
        value: openai/gpt-5.4
      - key: OPENROUTER_SYNTHESIZER_MODEL
        value: openai/gpt-5.4
      - key: EXA_API_KEY
        sync: false
      - key: EXA_SEARCH_ROUNDS
        value: "2"
      - key: EXA_RESULTS_PER_QUERY
        value: "4"
      - key: EXA_MAX_SOURCES
        value: "10"
      - key: EXA_USE_LLM_PLANNER
        value: "true"
      - key: EXA_RESEARCH_MODE
        value: llm
      - key: EXA_RESEARCH_MODEL
        value: openai/gpt-5.4-mini
      - key: EXA_RESEARCH_REASONING_EFFORT
        value: low
      - key: EXA_RESEARCH_QUERIES_PER_ROUND
        value: "4"
      - key: EXA_RESEARCH_TIMEOUT_SECONDS
        value: "25"
      - key: EXA_RESEARCH_MAX_SECONDS
        value: "420"
      - key: EXA_SEARCH_TIMEOUT_SECONDS
        value: "20"
      - key: AGENT_API_KEY
        sync: false
